<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSFINDER | Closest Separable State</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<button id="dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>

<nav class="site-nav">
    <a href="/" class="nav-link nav-link--active">App</a>
    <a href="/theory" class="nav-link">Theory</a>
</nav>

<div class="container">

    <header class="site-header">
        <h1>CSSFINDER</h1>
        <p class="subtitle">Find the Closest Separable State of a quantum density matrix via Gilbert's algorithm</p>
    </header>

    <div class="controls">

        <div>
            <div class="section-label">Quantum State</div>
            <div class="state-cards">
                <div class="state-card">
                    <input type="radio" name="state" id="state-bell" value="Bell" checked>
                    <label for="state-bell">
                        <span class="state-icon">|Φ⁺⟩</span>
                        <span class="state-name">Bell</span>
                        <span class="state-desc">Maximally entangled two-qubit state</span>
                    </label>
                </div>
                <div class="state-card">
                    <input type="radio" name="state" id="state-ghz" value="GHZ">
                    <label for="state-ghz">
                        <span class="state-icon">|GHZ⟩</span>
                        <span class="state-name">GHZ</span>
                        <span class="state-desc">Greenberger–Horne–Zeilinger three-qubit state</span>
                    </label>
                </div>
                <div class="state-card">
                    <input type="radio" name="state" id="state-w" value="W">
                    <label for="state-w">
                        <span class="state-icon">|W⟩</span>
                        <span class="state-name">W State</span>
                        <span class="state-desc">Robust three-qubit entanglement</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="param-row">
            <div class="param-field">
                <label for="number">Iterations</label>
                <input type="number" id="number" min="1" max="100" value="50">
            </div>
            <div class="param-field">
                <label for="trials">Trials</label>
                <input type="number" id="trials" min="1" value="10000">
            </div>
        </div>

        <button id="run-btn" onclick="runLogic()">Run Analysis</button>

        <div id="progress-bars" style="display: none;">
            <div class="progress-row">
                <div class="progress-label-row">
                    <span class="progress-label">Iterations</span>
                    <span class="progress-count" id="progress-label-itr"></span>
                </div>
                <div class="progress-track">
                    <div id="progress-bar-itr"></div>
                </div>
            </div>
            <div class="progress-row">
                <div class="progress-label-row">
                    <span class="progress-label">Trials</span>
                    <span class="progress-count" id="progress-label-trials"></span>
                </div>
                <div class="progress-track">
                    <div id="progress-bar-trials"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="results">

        <div class="result-card">
            <h3>Hilbert-Schmidt Distance</h3>
            <div class="value-display" id="res-num">—</div>
        </div>

        <div class="result-card">
            <h3>CSS Matrix</h3>
            <div id="matrix-container">
                <div id="res-matrix"></div>
                <button id="download-csv-btn" onclick="downloadMatrixCSV()">Download CSV</button>
            </div>
        </div>

        <div class="result-card">
            <h3>Convergence Plot</h3>
            <div class="plot-box">
                <img id="res-plot" src="" alt="Convergence plot">
            </div>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
