<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSFINDER | Logic Runner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<button id="dark-mode-toggle" aria-label="Toggle dark mode">🌙 Dark Mode</button>
<div class="container">
    <h1>CSSFINDER</h1>
    
    <div class="controls">
        <div class="input-group">
            <label for="state">Choose a quantum state:</label>
            <select id="state">
                <option value="Bell">Bell state</option>
                <option value="GHZ">GHZ state</option>
                <option value="W">W state</option>
            </select>
        </div>

        <div class="input-group">
            <label for="number">Number of Iterations:</label>
            <input type="number" id="number" min="1" max="100" value="50">
        </div>

        <div class="input-group">
            <label for="trials">Number of Trials:</label>
            <input type="number" id="trials" min="1" value="10000">
        </div>

        <button id="run-btn" onclick="runLogic()">Run Analysis</button>
        <div id="progress-bars" style="display: none;">
            <div class="progress-label">Iterations <span id="progress-label-itr"></span></div>
            <div class="progress-track">
                <div id="progress-bar-itr"></div>
            </div>
            <div class="progress-label">Trials <span id="progress-label-trials"></span></div>
            <div class="progress-track">
                <div id="progress-bar-trials"></div>
            </div>
        </div>
    </div>

    <div id="results" style="display: none;">
        <h3>Calculated Value: <span id="res-num" style="color: #3498db;">-</span></h3>
        
        <h3>Matrix Output:</h3>
        <div id="matrix-container">
            <div id="res-matrix"></div>
            <button id="download-csv-btn" onclick="downloadMatrixCSV()">Download CSV</button>
        </div>

        <h3>Visualization:</h3>
        <div class="plot-box">
            <img id="res-plot" src="" alt="Generated Plot">
        </div>
    </div>
</div>
